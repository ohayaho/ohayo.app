<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="day" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE44D"/>
      <stop offset="1" stop-color="#FF8C42"/>
    </linearGradient>
    <linearGradient id="night" x1="0" y1="100" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a35a8"/>
      <stop offset="1" stop-color="#0d1440"/>
    </linearGradient>
    <clipPath id="rr">
      <rect x="4" y="4" width="192" height="192" rx="46"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <rect x="6" y="10" width="192" height="192" rx="46" fill="rgba(0,0,0,0.12)"/>

  <!-- Background: day half -->
  <rect x="4" y="4"   width="192" height="96" fill="url(#day)"   clip-path="url(#rr)"/>
  <!-- Background: night half -->
  <rect x="4" y="100" width="192" height="96" fill="url(#night)" clip-path="url(#rr)"/>

  <!-- Wavy divider -->
  <path d="M4,100 Q50,84 100,100 Q150,116 196,100"
        stroke="rgba(255,255,255,0.55)" stroke-width="3.5" fill="none"
        clip-path="url(#rr)"/>

  <!-- Sun rays (top-left) -->
  <g transform="translate(42,50)"
     stroke="rgba(255,255,255,0.88)" stroke-width="3" stroke-linecap="round">
    <line x1="0"   y1="-18" x2="0"   y2="-24"/>
    <line x1="13"  y1="-13" x2="17"  y2="-17"/>
    <line x1="18"  y1="0"   x2="24"  y2="0"/>
    <line x1="13"  y1="13"  x2="17"  y2="17"/>
    <line x1="0"   y1="18"  x2="0"   y2="24"/>
    <line x1="-13" y1="13"  x2="-17" y2="17"/>
    <line x1="-18" y1="0"   x2="-24" y2="0"/>
    <line x1="-13" y1="-13" x2="-17" y2="-17"/>
  </g>
  <!-- Sun body -->
  <circle cx="42" cy="50" r="13" fill="rgba(255,255,255,0.93)"/>

  <!-- Moon crescent (top circle + dark overlay) -->
  <circle cx="158" cy="155" r="17" fill="rgba(218,198,255,0.92)"/>
  <circle cx="167" cy="148" r="13" fill="#2d1b6e"/>

  <!-- Stars in night half -->
  <circle cx="26" cy="148" r="3.2" fill="rgba(255,255,255,0.82)"/>
  <circle cx="48" cy="167" r="2.5" fill="rgba(255,255,255,0.62)"/>
  <circle cx="75" cy="158" r="2"   fill="rgba(255,255,255,0.55)"/>

  <!-- White sparkle (top-right) -->
  <polygon points="170,26 172,35 181,37 172,39 170,48 168,39 159,37 168,35"
           fill="rgba(255,255,255,0.80)"/>

  <!-- Gold mini-star -->
  <polygon points="128,140 129.5,146 136,147 129.5,148 128,154 126.5,148 120,147 126.5,146"
           fill="rgba(255,215,70,0.88)"/>

  <!-- Face: white halo ring -->
  <circle cx="100" cy="100" r="62" fill="white"/>
  <!-- Face: yellow -->
  <circle cx="100" cy="100" r="57" fill="#FFD93D"/>

  <!-- Eyes -->
  <circle cx="81"  cy="90" r="9.5" fill="#3a2400"/>
  <circle cx="119" cy="90" r="9.5" fill="#3a2400"/>
  <!-- Eye shine -->
  <circle cx="84"  cy="86" r="3.2" fill="white"/>
  <circle cx="122" cy="86" r="3.2" fill="white"/>

  <!-- Cheek blush -->
  <circle cx="68"  cy="112" r="13" fill="rgba(255,110,90,0.27)"/>
  <circle cx="132" cy="112" r="13" fill="rgba(255,110,90,0.27)"/>

  <!-- Smile -->
  <path d="M74,114 Q100,140 126,114"
        stroke="#3a2400" stroke-width="5.5" fill="none" stroke-linecap="round"/>
</svg>
