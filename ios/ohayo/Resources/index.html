<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ohayo.app</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', 'BIZ UDPGothic', sans-serif;
      background: linear-gradient(160deg, #ffe0ec 0%, #fff5cc 50%, #d4f0ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(clamp(16px, 4vw, 48px) + env(safe-area-inset-top))
        calc(clamp(12px, 4vw, 48px) + env(safe-area-inset-right))
        calc(clamp(24px, 5vw, 64px) + env(safe-area-inset-bottom))
        calc(clamp(12px, 4vw, 48px) + env(safe-area-inset-left));
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.5s ease;
    }

    body.night {
      background: linear-gradient(160deg, #1a1a4e 0%, #2d1b69 50%, #0d2b4e 100%);
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(900px, 100%);
      margin-bottom: clamp(12px, 3vw, 20px);
      position: relative;
    }

    /* ===== MODE TABS ===== */
    .mode-tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.55);
      padding: 6px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: background 0.5s ease;
    }

    body.night .mode-tabs {
      background: rgba(255, 255, 255, 0.12);
    }

    .tab {
      font-family: inherit;
      font-size: clamp(0.9rem, 3vw, 1.15rem);
      font-weight: bold;
      padding: 10px clamp(18px, 5vw, 32px);
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: #aaa;
      touch-action: manipulation;
    }

    .tab.active {
      background: white;
      color: #ff5a87;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    body.night .tab { color: #888; }
    body.night .tab.active {
      background: #2d1b69;
      color: #c7a8ff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    /* ===== SETTINGS BUTTON ===== */
    .settings-btn {
      position: absolute;
      right: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.7);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s, background 0.3s;
      touch-action: manipulation;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .settings-btn:active { transform: scale(0.88); }

    body.night .settings-btn {
      background: rgba(255,255,255,0.15);
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      margin-bottom: clamp(12px, 3vw, 24px);
      width: min(900px, 100%);
    }

    .hero-main {
      font-size: clamp(1.3rem, 6vw, 2.6rem);
      font-weight: bold;
      color: #ff5a87;
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-shadow: 2px 3px 0 #fff, 4px 5px 0 rgba(255,100,140,0.2);
      line-height: 1.3;
      transition: color 0.4s, text-shadow 0.4s;
    }

    body.night .hero-main {
      color: #c7a8ff;
      text-shadow: 2px 3px 0 rgba(0,0,0,0.4), 0 0 24px rgba(180,140,255,0.5);
    }

    .hero-sub {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: #999;
      margin-top: 4px;
      transition: color 0.4s;
    }

    body.night .hero-sub { color: #7a7aaa; }

/* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(12px, 3vw, 28px);
      width: min(900px, 100%);
    }

    /* ===== CARD FLIP ===== */
    .card-wrap {
      perspective: 900px;
      aspect-ratio: 1 / 1.1;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border-radius: clamp(16px, 4vw, 26px);
      touch-action: manipulation;
    }

    .card.done { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 12px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
    }

    .card-front {
      background: white;
      transition: background 0.4s;
    }

    body.night .card-front {
      background: #1e1e50;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
    }

    .card:not(.done):active .card-front {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transform: translateY(2px);
    }

    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #fffde7, #fff59d);
      border-bottom: 5px solid #ffd54f;
    }

    body.night .card-back {
      background: linear-gradient(145deg, #2d1b69, #1a1a6e);
      border-bottom: 5px solid #7c4dff;
    }

    /* Card accent colors — morning */
    .card-wrap:nth-child(1) .card-front { border-top: 7px solid #ff8aaa; }
    .card-wrap:nth-child(2) .card-front { border-top: 7px solid #ffb74d; }
    .card-wrap:nth-child(3) .card-front { border-top: 7px solid #4fc3f7; }
    .card-wrap:nth-child(4) .card-front { border-top: 7px solid #81c784; }
    .card-wrap:nth-child(5) .card-front { border-top: 7px solid #9575cd; }
    .card-wrap:nth-child(6) .card-front { border-top: 7px solid #f06292; }

    /* Card accent colors — night */
    body.night .card-wrap:nth-child(1) .card-front { border-top-color: #80cbc4; }
    body.night .card-wrap:nth-child(2) .card-front { border-top-color: #b39ddb; }
    body.night .card-wrap:nth-child(3) .card-front { border-top-color: #81d4fa; }
    body.night .card-wrap:nth-child(4) .card-front { border-top-color: #a5d6a7; }
    body.night .card-wrap:nth-child(5) .card-front { border-top-color: #ffe082; }
    body.night .card-wrap:nth-child(6) .card-front { border-top-color: #ef9a9a; }

    .card-icon  { font-size: clamp(2.2rem, 6vw, 4.2rem); line-height: 1; }
    .card-label { font-size: clamp(0.8rem, 2.2vw, 1.25rem); font-weight: bold; color: #444; transition: color 0.4s; }
    .card-check { font-size: clamp(3rem, 8vw, 5.5rem); line-height: 1; }
    .card-star  { font-size: clamp(1rem, 2.5vw, 1.6rem); }

    body.night .card-label { color: #c0c0e0; }

    /* ===== CELEBRATION ===== */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 24px);
      cursor: pointer;
      overflow: hidden;
    }

    #celebration.show {
      display: flex;
      animation: celebIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #celebration.morning-celeb {
      background: radial-gradient(ellipse at center, #fff176 0%, #ffee58 40%, #ffd740 100%);
    }

    #celebration.night-celeb {
      background: radial-gradient(ellipse at center, #311b92 0%, #1a237e 50%, #0d1440 100%);
    }

    @keyframes celebIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .celeb-emoji {
      font-size: clamp(4rem, 14vw, 8rem);
      animation: rocking 0.8s ease-in-out infinite alternate;
    }

    @keyframes rocking {
      from { transform: rotate(-15deg) scale(1);   }
      to   { transform: rotate( 15deg) scale(1.12); }
    }

    .celeb-text {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: bold;
      text-align: center;
      line-height: 1.25;
      animation: textBounce 0.65s ease-in-out infinite alternate;
    }

    .morning-celeb .celeb-text {
      color: #e53935;
      text-shadow: 3px 4px 0 #fff, 6px 8px 0 rgba(255,80,80,0.25);
    }

    .night-celeb .celeb-text {
      color: #e8d5ff;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.5), 0 0 30px rgba(200,150,255,0.7);
    }

    @keyframes textBounce {
      from { transform: translateY(0)    rotate(-2deg); }
      to   { transform: translateY(-14px) rotate( 2deg); }
    }

    .celeb-sub {
      font-size: clamp(0.9rem, 2.8vw, 1.4rem);
      color: #333;
      background: rgba(255,255,255,0.85);
      padding: 8px 28px;
      border-radius: 50px;
      margin-top: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 2px;
      opacity: 1;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(900deg); opacity: 0; }
    }

    /* ===== SETTINGS PAGE ===== */
    #settings-page {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    #settings-page.open {
      transform: translateX(0);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(16px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 16px calc(20px + env(safe-area-inset-left));
      background: white;
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 1;
      gap: 8px;
    }

    .settings-header h2 {
      font-size: 1.15rem;
      color: #333;
      font-weight: bold;
      white-space: nowrap;
    }

    .back-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #ff5a87;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .back-btn:active { background: #f0f0f0; }

    .reset-btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      color: #aaa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .reset-btn:active { background: #f0f0f0; }

    /* settings mode tabs */
    .settings-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 20px 8px;
      justify-content: center;
    }

    .stab {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 28px;
      border-radius: 50px;
      border: 2px solid #e0e0e0;
      background: white;
      color: #aaa;
      cursor: pointer;
      transition: all 0.25s;
      touch-action: manipulation;
    }

    .stab.active {
      background: #ff5a87;
      border-color: #ff5a87;
      color: white;
      box-shadow: 0 3px 10px rgba(255,90,135,0.4);
    }

    .settings-hint {
      text-align: center;
      color: #bbb;
      font-size: 0.82rem;
      padding: 2px 20px 14px;
    }

    /* settings form rows */
    .settings-list {
      flex: 1;
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .row-num {
      width: 20px;
      text-align: center;
      color: #ccc;
      font-size: 0.8rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .emoji-input {
      width: 58px;
      height: 58px;
      font-size: 1.9rem;
      text-align: center;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      background: #fafafa;
      outline: none;
      cursor: text;
      transition: border-color 0.2s;
      flex-shrink: 0;
      /* allow user interaction */
      user-select: text;
      -webkit-user-select: text;
    }

    .emoji-input:focus { border-color: #ff5a87; }

    .label-input {
      flex: 1;
      min-width: 0;
      height: 50px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: bold;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 0 14px;
      background: #fafafa;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      /* allow user interaction */
      user-select: text;
      -webkit-user-select: text;
    }

    .label-input:focus { border-color: #ff5a87; }

    .save-btn {
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: bold;
      margin: 8px 14px 32px;
      padding: 16px;
      background: linear-gradient(135deg, #ff5a87, #ff8c69);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,90,135,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      touch-action: manipulation;
    }

    .save-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(255,90,135,0.35);
    }

    /* grid columns are set dynamically by calcColumns() in JS */

    /* ===== RESPONSIVE ===== */
    @media (max-width: 699px) {
      .hero-main { text-shadow: none; }
    }
  </style>
</head>
<body>

<!-- ===== HERO ===== -->
<div class="hero">
  <div class="hero-main">できたら　おしてみよう！</div>
  <div class="hero-sub">平日の朝をちょっとラクにする、したくサポート</div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="top-bar">
  <div class="mode-tabs">
    <button class="tab active" id="tab-asa"  onclick="switchMode('asa')">☀️ あさ</button>
    <button class="tab"        id="tab-neru" onclick="switchMode('neru')">🌙 よる</button>
  </div>
  <button class="settings-btn" onclick="openSettings()" aria-label="せってい">⚙️</button>
</div>

<!-- ===== CARD GRID ===== -->
<div class="grid" id="grid"></div>

<!-- ===== CELEBRATION ===== -->
<div id="celebration" onclick="resetAll()">
  <div class="celeb-emoji" id="celeb-emoji-top">🌟</div>
  <div class="celeb-text"  id="celeb-text">がんばったね！</div>
  <div class="celeb-emoji" id="celeb-emoji-bot">🎉</div>
  <div class="celeb-sub">タップしてもどる</div>
</div>

<!-- ===== SETTINGS PAGE ===== -->
<div id="settings-page">
  <div class="settings-header">
    <button class="back-btn"  onclick="closeSettings()">← もどる</button>
    <h2>⚙️ せってい</h2>
    <button class="reset-btn" onclick="resetDefaults()">リセット</button>
  </div>

  <div class="settings-tabs">
    <button class="stab active" id="stab-asa"  onclick="switchSettingsTab('asa')">☀️ あさ</button>
    <button class="stab"        id="stab-neru" onclick="switchSettingsTab('neru')">🌙 よる</button>
  </div>

  <p class="settings-hint">アイコンとなまえをかえられます</p>

  <div class="settings-list" id="settings-list"></div>

  <button class="save-btn" onclick="saveSettings()">💾 セーブ</button>
</div>

<script>
  /* ============================================================
     DEFAULT DATA (変更しない)
  ============================================================ */
  const DEFAULT_MODES = {
    asa: {
      tasks: [
        { icon: '😴', label: 'ぱじゃまをぬぐ' },
        { icon: '👕', label: 'きがえ' },
        { icon: '🧦', label: 'くつした' },
        { icon: '🍚', label: 'あさごはん' },
        { icon: '🪥', label: 'はみがき' },
        { icon: '🚽', label: 'といれ' },
      ],
    },
    neru: {
      tasks: [
        { icon: '🛁', label: 'おふろ' },
        { icon: '👕', label: 'パジャマ' },
        { icon: '🪥', label: 'はみがき' },
        { icon: '🚽', label: 'といれ' },
        { icon: '📚', label: 'えほん' },
        { icon: '💤', label: 'ねる' },
      ],
    },
  };

  /* ============================================================
     MODES CONFIG (tasks はカスタマイズ可能)
  ============================================================ */
  const MODES = {
    asa: {
      title:      '🌈 あさのしたく',
      tasks:      DEFAULT_MODES.asa.tasks.map(t => ({...t})),
      check:      '😊',
      star:       '⭐',
      celebClass: 'morning-celeb',
      celebText:  'がんばったね！',
      celebTop:   '🌟',
      celebBot:   '🎉',
      confetti:   ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#3bc9db'],
    },
    neru: {
      title:      '🌙 ねるしたく',
      tasks:      DEFAULT_MODES.neru.tasks.map(t => ({...t})),
      check:      '😴',
      star:       '🌙',
      celebClass: 'night-celeb',
      celebText:  'おやすみなさい！',
      celebTop:   '🌙',
      celebBot:   '⭐',
      confetti:   ['#b39ddb','#7986cb','#4dd0e1','#e0e0e0','#9575cd','#80cbc4','#ce93d8','#fff9c4'],
    },
  };

  /* ============================================================
     STATE
  ============================================================ */
  let currentMode        = 'asa';
  let doneCount          = 0;
  let currentSettingsTab = 'asa';
  let settingsBuffer     = {};

  // ── Helpers ──
  function calcColumns(count) {
    const w = window.innerWidth;
    // portrait phone: <480px → max 2 cols
    // tablet/landscape: ≥700px → max 4 cols
    // in between: max 3 cols
    const maxCols = w < 480 ? 2 : w >= 700 ? 4 : 3;
    // Find the largest divisor of count within [1, maxCols] for symmetric layout
    for (let c = maxCols; c >= 1; c--) {
      if (count % c === 0) return c;
    }
    return 1;
  }

  function applyGridColumns() {
    const count = MODES[currentMode].tasks.length;
    document.getElementById('grid').style.gridTemplateColumns =
      `repeat(${calcColumns(count)}, 1fr)`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function clearCelebration() {
    document.getElementById('celebration').classList.remove('show');
    document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
  }
  function setActiveTab(prefix, mode) {
    document.getElementById(`${prefix}-asa`).classList.toggle('active',  mode === 'asa');
    document.getElementById(`${prefix}-neru`).classList.toggle('active', mode === 'neru');
  }

  /* ============================================================
     LOCAL STORAGE
  ============================================================ */
  function loadFromStorage() {
    try {
      const saved = localStorage.getItem('shitaku_custom_tasks');
      if (!saved) return;
      const data = JSON.parse(saved);
      ['asa', 'neru'].forEach(key => {
        if (data[key] && Array.isArray(data[key])
            && data[key].length === DEFAULT_MODES[key].tasks.length) {
          MODES[key].tasks = data[key].map(t => ({
            icon:  String(t.icon  || DEFAULT_MODES[key].tasks[0].icon),
            label: String(t.label || DEFAULT_MODES[key].tasks[0].label),
          }));
        }
      });
    } catch(e) { /* ignore */ }
  }

  function saveToStorage() {
    try {
      localStorage.setItem('shitaku_custom_tasks', JSON.stringify({
        asa:  MODES.asa.tasks,
        neru: MODES.neru.tasks,
      }));
    } catch(e) { /* ignore */ }
  }

  /* ============================================================
     MAIN SCREEN
  ============================================================ */
  function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    document.body.classList.toggle('night', mode === 'neru');
    setActiveTab('tab', mode);
    clearCelebration();
    doneCount = 0;
    buildCards();
  }

  function buildCards() {
    const mode = MODES[currentMode];
    applyGridColumns();
    document.getElementById('grid').innerHTML = mode.tasks.map((task, i) => `
      <div class="card-wrap">
        <div class="card" id="card-${i}" onclick="flipCard(${i})">
          <div class="card-front">
            <div class="card-icon">${esc(task.icon)}</div>
            <div class="card-label">${esc(task.label)}</div>
          </div>
          <div class="card-back">
            <div class="card-check">${mode.check}</div>
            <div class="card-star">${mode.star}</div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function flipCard(i) {
    const card = document.getElementById(`card-${i}`);
    if (card.classList.contains('done')) return;
    card.classList.add('done');
    doneCount++;
    if (doneCount === MODES[currentMode].tasks.length) {
      setTimeout(showCelebration, 700);
    }
  }

  function showCelebration() {
    const mode = MODES[currentMode];
    const el   = document.getElementById('celebration');
    el.className = `${mode.celebClass} show`;
    document.getElementById('celeb-text').textContent      = mode.celebText;
    document.getElementById('celeb-emoji-top').textContent = mode.celebTop;
    document.getElementById('celeb-emoji-bot').textContent = mode.celebBot;
    launchConfetti(mode.confetti);
  }

  function launchConfetti(colors) {
    const target = document.getElementById('celebration');
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left              = (Math.random() * 100) + 'vw';
        el.style.background        = colors[Math.floor(Math.random() * colors.length)];
        el.style.width             = (7  + Math.random() * 9)  + 'px';
        el.style.height            = (10 + Math.random() * 12) + 'px';
        el.style.animationDuration = (1.8 + Math.random() * 2.5) + 's';
        el.style.animationDelay    = (Math.random() * 0.3) + 's';
        target.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }, i * 25);
    }
  }

  function resetAll() {
    clearCelebration();
    doneCount = 0;
    MODES[currentMode].tasks.forEach((_, i) => {
      document.getElementById(`card-${i}`).classList.remove('done');
    });
  }

  /* ============================================================
     SETTINGS
  ============================================================ */
  function openSettings() {
    // deep-copy current tasks into editing buffer
    settingsBuffer = {
      asa:  MODES.asa.tasks.map(t  => ({...t})),
      neru: MODES.neru.tasks.map(t => ({...t})),
    };
    currentSettingsTab = currentMode;
    updateSettingsTabs();
    buildSettingsForm();
    document.getElementById('settings-page').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settings-page').classList.remove('open');
  }

  function switchSettingsTab(mode) {
    if (mode === currentSettingsTab) return;
    collectFormToBuffer();      // 現在のフォームをバッファに保存
    currentSettingsTab = mode;
    updateSettingsTabs();
    buildSettingsForm();
  }

  function updateSettingsTabs() {
    setActiveTab('stab', currentSettingsTab);
  }

  function buildSettingsForm() {
    const tasks = settingsBuffer[currentSettingsTab];
    document.getElementById('settings-list').innerHTML = tasks.map((task, i) => `
      <div class="settings-row">
        <span class="row-num">${i + 1}</span>
        <input type="text" class="emoji-input" value="${esc(task.icon)}" placeholder="🙂" aria-label="アイコン ${i + 1}">
        <input type="text" class="label-input" value="${esc(task.label)}" maxlength="10" placeholder="なまえ" aria-label="なまえ ${i + 1}">
      </div>
    `).join('');
  }

  function collectFormToBuffer() {
    const rows     = document.querySelectorAll('#settings-list .settings-row');
    const defaults = DEFAULT_MODES[currentSettingsTab].tasks;
    settingsBuffer[currentSettingsTab] = Array.from(rows).map((row, i) => ({
      icon:  row.querySelector('.emoji-input').value.trim()  || defaults[i].icon,
      label: row.querySelector('.label-input').value.trim()  || defaults[i].label,
    }));
  }

  function saveSettings() {
    collectFormToBuffer();
    // バッファを MODES に反映
    MODES.asa.tasks  = settingsBuffer.asa.map(t  => ({...t}));
    MODES.neru.tasks = settingsBuffer.neru.map(t => ({...t}));
    saveToStorage();
    doneCount = 0;
    clearCelebration();
    buildCards();
    closeSettings();
  }

  function resetDefaults() {
    if (!confirm('ぜんぶデフォルトにもどしますか？')) return;
    settingsBuffer = {
      asa:  DEFAULT_MODES.asa.tasks.map(t  => ({...t})),
      neru: DEFAULT_MODES.neru.tasks.map(t => ({...t})),
    };
    buildSettingsForm();
  }

  /* ============================================================
     INIT
  ============================================================ */
  window.addEventListener('resize', applyGridColumns);
  loadFromStorage();
  buildCards();
</script>
</body>
</html>
