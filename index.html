<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ohayo.app</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <script>
    // Vercel Analytics — web only. Disabled in the native app (file://) for
    // App Store Kids Category compliance: no third-party analytics on device.
    if (location.protocol === 'file:') {
      window.va = function () {};
    } else {
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
      var vaScript = document.createElement('script');
      vaScript.defer = true;
      vaScript.src = '/_vercel/insights/script.js';
      document.head.appendChild(vaScript);
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', 'BIZ UDPGothic', sans-serif;
      background: linear-gradient(160deg, #ffe0ec 0%, #fff5cc 50%, #d4f0ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(clamp(16px, 4vw, 48px) + env(safe-area-inset-top))
        calc(clamp(12px, 4vw, 48px) + env(safe-area-inset-right))
        calc(clamp(24px, 5vw, 64px) + env(safe-area-inset-bottom))
        calc(clamp(12px, 4vw, 48px) + env(safe-area-inset-left));
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.5s ease;
    }

    body.night {
      background: linear-gradient(160deg, #1a1a4e 0%, #2d1b69 50%, #0d2b4e 100%);
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(900px, 100%);
      margin-bottom: clamp(12px, 3vw, 20px);
      position: relative;
    }

    /* ===== MODE TABS ===== */
    .mode-tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.55);
      padding: 6px;
      border-radius: 50px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
      transition: background 0.5s ease;
    }

    body.night .mode-tabs {
      background: rgba(255, 255, 255, 0.12);
    }

    .tab {
      font-family: inherit;
      font-size: clamp(0.9rem, 3vw, 1.15rem);
      font-weight: bold;
      padding: 10px clamp(18px, 5vw, 32px);
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: #aaa;
      touch-action: manipulation;
    }

    .tab.active {
      background: white;
      color: #ff5a87;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    body.night .tab { color: #888; }
    body.night .tab.active {
      background: #2d1b69;
      color: #c7a8ff;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    /* ===== SETTINGS BUTTON ===== */
    .settings-btn {
      position: absolute;
      right: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.7);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: transform 0.2s, background 0.3s;
      touch-action: manipulation;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .settings-btn:active { transform: scale(0.88); }

    body.night .settings-btn {
      background: rgba(255,255,255,0.15);
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      margin-bottom: clamp(12px, 3vw, 24px);
      width: min(900px, 100%);
    }

    .hero-main {
      font-size: clamp(1.3rem, 6vw, 2.6rem);
      font-weight: bold;
      color: #ff5a87;
      letter-spacing: 0.05em;
      white-space: nowrap;
      text-shadow: 2px 3px 0 #fff, 4px 5px 0 rgba(255,100,140,0.2);
      line-height: 1.3;
      transition: color 0.4s, text-shadow 0.4s;
    }

    body.night .hero-main {
      color: #c7a8ff;
      text-shadow: 2px 3px 0 rgba(0,0,0,0.4), 0 0 24px rgba(180,140,255,0.5);
    }

    .hero-sub {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: #999;
      margin-top: 4px;
      transition: color 0.4s;
    }

    body.night .hero-sub { color: #7a7aaa; }

/* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(12px, 3vw, 28px);
      width: min(900px, 100%);
    }

    /* ===== CARD FLIP ===== */
    .card-wrap {
      perspective: 900px;
      aspect-ratio: 1 / 1.1;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border-radius: clamp(16px, 4vw, 26px);
      touch-action: manipulation;
    }

    .card.done { transform: rotateY(180deg); }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 1.5vw, 12px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
    }

    .card-front {
      background: white;
      transition: background 0.4s;
    }

    body.night .card-front {
      background: #1e1e50;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
    }

    .card:not(.done):active .card-front {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transform: translateY(2px);
    }

    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #fffde7, #fff59d);
      border-bottom: 5px solid #ffd54f;
    }

    body.night .card-back {
      background: linear-gradient(145deg, #2d1b69, #1a1a6e);
      border-bottom: 5px solid #7c4dff;
    }

    /* Card accent colors — morning */
    .card-wrap:nth-child(1) .card-front { border-top: 7px solid #ff8aaa; }
    .card-wrap:nth-child(2) .card-front { border-top: 7px solid #ffb74d; }
    .card-wrap:nth-child(3) .card-front { border-top: 7px solid #4fc3f7; }
    .card-wrap:nth-child(4) .card-front { border-top: 7px solid #81c784; }
    .card-wrap:nth-child(5) .card-front { border-top: 7px solid #9575cd; }
    .card-wrap:nth-child(6) .card-front { border-top: 7px solid #f06292; }

    /* Card accent colors — night */
    body.night .card-wrap:nth-child(1) .card-front { border-top-color: #80cbc4; }
    body.night .card-wrap:nth-child(2) .card-front { border-top-color: #b39ddb; }
    body.night .card-wrap:nth-child(3) .card-front { border-top-color: #81d4fa; }
    body.night .card-wrap:nth-child(4) .card-front { border-top-color: #a5d6a7; }
    body.night .card-wrap:nth-child(5) .card-front { border-top-color: #ffe082; }
    body.night .card-wrap:nth-child(6) .card-front { border-top-color: #ef9a9a; }

    .card-icon  { font-size: clamp(2.2rem, 6vw, 4.2rem); line-height: 1; }
    .card-label { font-size: clamp(0.8rem, 2.2vw, 1.25rem); font-weight: bold; color: #444; transition: color 0.4s; }
    .card-check { font-size: clamp(3rem, 8vw, 5.5rem); line-height: 1; }
    .card-star  { font-size: clamp(1rem, 2.5vw, 1.6rem); }

    /* reward image on the card back (when set in settings) */
    .card-back.has-img { background-size: cover; background-position: center; }
    .card-back.has-img .card-check { display: none; }
    .card-back.has-img .card-star {
      position: absolute; top: 8px; right: 10px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
    }

    body.night .card-label { color: #c0c0e0; }

    /* ===== CELEBRATION ===== */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 24px);
      cursor: pointer;
      overflow: hidden;
    }

    #celebration.show {
      display: flex;
      animation: celebIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #celebration.morning-celeb {
      background: radial-gradient(ellipse at center, #fff176 0%, #ffee58 40%, #ffd740 100%);
    }

    #celebration.night-celeb {
      background: radial-gradient(ellipse at center, #311b92 0%, #1a237e 50%, #0d1440 100%);
    }

    @keyframes celebIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .celeb-emoji {
      font-size: clamp(4rem, 14vw, 8rem);
      animation: rocking 0.8s ease-in-out infinite alternate;
    }

    @keyframes rocking {
      from { transform: rotate(-15deg) scale(1);   }
      to   { transform: rotate( 15deg) scale(1.12); }
    }

    .celeb-text {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: bold;
      text-align: center;
      line-height: 1.25;
      animation: textBounce 0.65s ease-in-out infinite alternate;
    }

    .morning-celeb .celeb-text {
      color: #e53935;
      text-shadow: 3px 4px 0 #fff, 6px 8px 0 rgba(255,80,80,0.25);
    }

    .night-celeb .celeb-text {
      color: #e8d5ff;
      text-shadow: 3px 4px 0 rgba(0,0,0,0.5), 0 0 30px rgba(200,150,255,0.7);
    }

    @keyframes textBounce {
      from { transform: translateY(0)    rotate(-2deg); }
      to   { transform: translateY(-14px) rotate( 2deg); }
    }

    .celeb-sub {
      font-size: clamp(0.9rem, 2.8vw, 1.4rem);
      color: #333;
      background: rgba(255,255,255,0.85);
      padding: 8px 28px;
      border-radius: 50px;
      margin-top: 8px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    /* ===== CONFETTI ===== */
    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 2px;
      opacity: 1;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(900deg); opacity: 0; }
    }

    /* ===== SETTINGS PAGE ===== */
    .settings-panel {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* sub-pages stack above the hub */
    #settings-tasks, #settings-reward { z-index: 410; }

    .settings-panel.open {
      transform: translateX(0);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(16px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 16px calc(20px + env(safe-area-inset-left));
      background: white;
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 1;
      gap: 8px;
    }

    .settings-header h2 {
      font-size: 1.15rem;
      color: #333;
      font-weight: bold;
      white-space: nowrap;
    }

    .back-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      color: #ff5a87;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .back-btn:active { background: #f0f0f0; }

    .reset-btn {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      color: #aaa;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .reset-btn:active { background: #f0f0f0; }

    /* header spacer to keep the title centered */
    .header-spacer { width: 64px; }

    /* settings hub menu */
    .menu-list { padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; }
    .menu-row {
      display: flex; align-items: center; gap: 14px;
      width: 100%; text-align: left;
      font-family: inherit; cursor: pointer;
      background: white; border: none; border-radius: 14px;
      padding: 18px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      touch-action: manipulation;
    }
    .menu-row:active { background: #f3f3f5; }
    .menu-ic { font-size: 1.7rem; flex-shrink: 0; width: 36px; text-align: center; }
    .menu-tx { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .menu-tx b { color: #333; font-size: 1.02rem; }
    .menu-tx small { color: #999; font-size: 0.78rem; margin-top: 2px; }
    .menu-arrow { color: #ccc; font-size: 1.5rem; font-weight: bold; flex-shrink: 0; }
    .menu-row.danger b { color: #e0607f; }

    /* settings mode tabs */
    .settings-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 20px 8px;
      justify-content: center;
    }

    .stab {
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 28px;
      border-radius: 50px;
      border: 2px solid #e0e0e0;
      background: white;
      color: #aaa;
      cursor: pointer;
      transition: all 0.25s;
      touch-action: manipulation;
    }

    .stab.active {
      background: #ff5a87;
      border-color: #ff5a87;
      color: white;
      box-shadow: 0 3px 10px rgba(255,90,135,0.4);
    }

    .settings-hint {
      text-align: center;
      color: #bbb;
      font-size: 0.82rem;
      padding: 2px 20px 14px;
    }

    /* settings form rows */
    .settings-list {
      flex: 1;
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .row-num {
      width: 20px;
      text-align: center;
      color: #ccc;
      font-size: 0.8rem;
      font-weight: bold;
      flex-shrink: 0;
    }

    .emoji-input {
      width: 58px;
      height: 58px;
      font-size: 1.9rem;
      text-align: center;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      background: #fafafa;
      outline: none;
      cursor: text;
      transition: border-color 0.2s;
      flex-shrink: 0;
      /* allow user interaction */
      user-select: text;
      -webkit-user-select: text;
    }

    .emoji-input:focus { border-color: #ff5a87; }

    .label-input {
      flex: 1;
      min-width: 0;
      height: 50px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: bold;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 0 14px;
      background: #fafafa;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
      /* allow user interaction */
      user-select: text;
      -webkit-user-select: text;
    }

    .label-input:focus { border-color: #ff5a87; }

    /* reward image section in settings */
    .reward-section {
      margin: 0 14px 14px; padding: 16px;
      background: white; border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; align-items: center;
    }
    .reward-title { font-weight: bold; color: #444; font-size: 0.98rem; align-self: flex-start; }
    .reward-desc  { color: #999; font-size: 0.78rem; margin-top: 2px; align-self: flex-start; }
    .reward-frame {
      width: 150px; height: 180px; margin: 14px 0 4px;
      border-radius: 14px; border: 2px dashed #ddd;
      background: #f3f3f5 no-repeat;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; color: #ccc; overflow: hidden;
      touch-action: none; cursor: grab; user-select: none;
    }
    .reward-frame.set { border-style: solid; border-color: #ffd54f; cursor: grab; }
    .reward-frame.set:active { cursor: grabbing; }
    .reward-zoom { width: 80%; margin: 10px 0 2px; accent-color: #ff5a87; }
    .reward-hint { color: #bbb; font-size: 0.74rem; margin-bottom: 10px; }
    .reward-btns  { display: flex; gap: 8px; }
    .reward-btn {
      font-family: inherit; font-size: 0.85rem; font-weight: bold;
      padding: 8px 16px; border: none; border-radius: 10px;
      background: #ff5a87; color: #fff; cursor: pointer;
      touch-action: manipulation;
    }
    .reward-btn.sub { background: #eee; color: #888; }
    .reward-btn:active { transform: scale(0.97); }
    #reward-file { display: none; }

    .save-btn {
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: bold;
      margin: 8px 14px 32px;
      padding: 16px;
      background: linear-gradient(135deg, #ff5a87, #ff8c69);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,90,135,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      touch-action: manipulation;
    }

    .save-btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(255,90,135,0.35);
    }

    /* grid columns are set dynamically by calcColumns() in JS */

    /* ===== RESPONSIVE ===== */
    @media (max-width: 699px) {
      .hero-main { text-shadow: none; }
    }
  </style>
</head>
<body>

<!-- ===== HERO ===== -->
<div class="hero">
  <div class="hero-main">できたら　おしてみよう！</div>
  <div class="hero-sub">平日の朝をちょっとラクにする、したくサポート</div>
</div>

<!-- ===== TOP BAR ===== -->
<div class="top-bar">
  <div class="mode-tabs">
    <button class="tab active" id="tab-asa"  onclick="switchMode('asa')">☀️ あさ</button>
    <button class="tab"        id="tab-neru" onclick="switchMode('neru')">🌙 よる</button>
  </div>
  <button class="settings-btn" onclick="openSettings()" aria-label="せってい">⚙️</button>
</div>

<!-- ===== CARD GRID ===== -->
<div class="grid" id="grid"></div>

<!-- ===== CELEBRATION ===== -->
<div id="celebration" onclick="resetAll()">
  <div class="celeb-emoji" id="celeb-emoji-top">🌟</div>
  <div class="celeb-text"  id="celeb-text">がんばったね！</div>
  <div class="celeb-emoji" id="celeb-emoji-bot">🎉</div>
  <div class="celeb-sub">タップしてもどる</div>
</div>

<!-- ===== SETTINGS — HUB ===== -->
<div id="settings-page" class="settings-panel">
  <div class="settings-header">
    <button class="back-btn" onclick="closeSettings()">← もどる</button>
    <h2>⚙️ せってい</h2>
    <span class="header-spacer"></span>
  </div>

  <div class="menu-list">
    <button class="menu-row" onclick="openTasksPage()">
      <span class="menu-ic">🃏</span>
      <span class="menu-tx"><b>カードのへんしゅう</b><small>アイコン・なまえ</small></span>
      <span class="menu-arrow">›</span>
    </button>
    <button class="menu-row" onclick="openRewardPage()">
      <span class="menu-ic">🎁</span>
      <span class="menu-tx"><b>ごほうび画像</b><small>できたカードに表示</small></span>
      <span class="menu-arrow">›</span>
    </button>
    <button class="menu-row danger" onclick="resetDefaults()">
      <span class="menu-ic">↩︎</span>
      <span class="menu-tx"><b>カードをデフォルトにもどす</b></span>
    </button>
  </div>
</div>

<!-- ===== SETTINGS — CARDS ===== -->
<div id="settings-tasks" class="settings-panel">
  <div class="settings-header">
    <button class="back-btn" onclick="closeTasksPage()">← もどる</button>
    <h2>🃏 カード</h2>
    <span class="header-spacer"></span>
  </div>

  <div class="settings-tabs">
    <button class="stab active" id="stab-asa"  onclick="switchSettingsTab('asa')">☀️ あさ</button>
    <button class="stab"        id="stab-neru" onclick="switchSettingsTab('neru')">🌙 よる</button>
  </div>

  <p class="settings-hint">アイコンとなまえをかえられます</p>

  <div class="settings-list" id="settings-list"></div>

  <button class="save-btn" onclick="saveTasks()">💾 セーブ</button>
</div>

<!-- ===== SETTINGS — REWARD IMAGE ===== -->
<div id="settings-reward" class="settings-panel">
  <div class="settings-header">
    <button class="back-btn" onclick="closeRewardPage()">← もどる</button>
    <h2>🎁 ごほうび画像</h2>
    <span class="header-spacer"></span>
  </div>

  <div class="reward-section">
    <div class="reward-desc">できたカードに表示されます（ぜんぶ共通）</div>
    <div class="reward-frame" id="reward-frame">🎁</div>
    <input type="range" id="reward-zoom" class="reward-zoom" min="1" max="3" step="0.01" value="1" oninput="onRewardZoom(this.value)">
    <div class="reward-hint" id="reward-hint">ドラッグで位置、スライダーで大きさを調整</div>
    <div class="reward-btns">
      <button class="reward-btn" onclick="document.getElementById('reward-file').click()">画像をえらぶ</button>
      <button class="reward-btn sub" id="reward-clear" onclick="clearRewardImage()">けす</button>
    </div>
    <input type="file" id="reward-file" accept="image/*" onchange="handleRewardImageFile(this)">
  </div>

  <button class="save-btn" onclick="saveReward()">💾 セーブ</button>
</div>

<script>
  /* ============================================================
     DEFAULT DATA (変更しない)
  ============================================================ */
  const DEFAULT_MODES = {
    asa: {
      tasks: [
        { icon: '😴', label: 'ぱじゃまをぬぐ' },
        { icon: '👕', label: 'きがえ' },
        { icon: '🧦', label: 'くつした' },
        { icon: '🍚', label: 'あさごはん' },
        { icon: '🪥', label: 'はみがき' },
        { icon: '🚽', label: 'といれ' },
      ],
    },
    neru: {
      tasks: [
        { icon: '🛁', label: 'おふろ' },
        { icon: '👕', label: 'パジャマ' },
        { icon: '🪥', label: 'はみがき' },
        { icon: '🚽', label: 'といれ' },
        { icon: '📚', label: 'えほん' },
        { icon: '💤', label: 'ねる' },
      ],
    },
  };

  /* ============================================================
     MODES CONFIG (tasks はカスタマイズ可能)
  ============================================================ */
  const MODES = {
    asa: {
      title:      '🌈 あさのしたく',
      tasks:      DEFAULT_MODES.asa.tasks.map(t => ({...t})),
      check:      '😊',
      star:       '⭐',
      celebClass: 'morning-celeb',
      celebText:  'がんばったね！',
      celebTop:   '🌟',
      celebBot:   '🎉',
      confetti:   ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#3bc9db'],
    },
    neru: {
      title:      '🌙 ねるしたく',
      tasks:      DEFAULT_MODES.neru.tasks.map(t => ({...t})),
      check:      '😴',
      star:       '🌙',
      celebClass: 'night-celeb',
      celebText:  'おやすみなさい！',
      celebTop:   '🌙',
      celebBot:   '⭐',
      confetti:   ['#b39ddb','#7986cb','#4dd0e1','#e0e0e0','#9575cd','#80cbc4','#ce93d8','#fff9c4'],
    },
  };

  /* ============================================================
     STATE
  ============================================================ */
  let currentMode        = 'asa';
  let doneCount          = 0;
  let currentSettingsTab = 'asa';
  let settingsBuffer     = {};
  // Reward image config: { img:dataURL, posX, posY, zoom, nw, nh } | null
  let rewardCfg         = null;  // applied to completed cards
  let settingsRewardCfg = null;  // editing buffer

  // Returns the reward config for card i. Currently global; will become
  // per-card later (just return a per-index value when that ships).
  function getRewardCfg(i) { return rewardCfg; }

  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // Parse stored value (JSON config, or a legacy bare dataURL string).
  function parseRewardCfg(raw) {
    if (!raw) return null;
    if (raw[0] === '{') { try { return JSON.parse(raw); } catch (e) { return null; } }
    if (raw.startsWith('data:')) return { img: raw, posX: 50, posY: 50, zoom: 1, nw: 0, nh: 0 };
    return null;
  }

  // Apply a reward config as a background on an element of size CW×CH.
  // Pan via background-position(%), zoom via background-size(px) computed
  // from the cover baseline, so it never leaves a gap.
  function applyRewardBg(el, cfg, CW, CH) {
    el.style.backgroundImage = `url('${cfg.img}')`;
    el.style.backgroundRepeat = 'no-repeat';
    el.style.backgroundPosition = `${cfg.posX}% ${cfg.posY}%`;
    if (cfg.nw && cfg.nh && CW && CH) {
      const cover = Math.max(CW / cfg.nw, CH / cfg.nh);
      el.style.backgroundSize = `${cfg.nw * cover * cfg.zoom}px ${cfg.nh * cover * cfg.zoom}px`;
    } else {
      el.style.backgroundSize = 'cover';
    }
  }

  // ── Helpers ──
  function calcColumns(count) {
    const w = window.innerWidth;
    // portrait phone: <480px → max 2 cols
    // tablet/landscape: ≥700px → max 4 cols
    // in between: max 3 cols
    const maxCols = w < 480 ? 2 : w >= 700 ? 4 : 3;
    // Find the largest divisor of count within [1, maxCols] for symmetric layout
    for (let c = maxCols; c >= 1; c--) {
      if (count % c === 0) return c;
    }
    return 1;
  }

  function applyGridColumns() {
    const count = MODES[currentMode].tasks.length;
    document.getElementById('grid').style.gridTemplateColumns =
      `repeat(${calcColumns(count)}, 1fr)`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function clearCelebration() {
    document.getElementById('celebration').classList.remove('show');
    document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
  }
  function setActiveTab(prefix, mode) {
    document.getElementById(`${prefix}-asa`).classList.toggle('active',  mode === 'asa');
    document.getElementById(`${prefix}-neru`).classList.toggle('active', mode === 'neru');
  }

  /* ============================================================
     LOCAL STORAGE
  ============================================================ */
  function loadFromStorage() {
    try {
      rewardCfg = parseRewardCfg(localStorage.getItem('shitaku_reward_image'));
      const saved = localStorage.getItem('shitaku_custom_tasks');
      if (!saved) return;
      const data = JSON.parse(saved);
      ['asa', 'neru'].forEach(key => {
        if (data[key] && Array.isArray(data[key])
            && data[key].length === DEFAULT_MODES[key].tasks.length) {
          MODES[key].tasks = data[key].map(t => ({
            icon:  String(t.icon  || DEFAULT_MODES[key].tasks[0].icon),
            label: String(t.label || DEFAULT_MODES[key].tasks[0].label),
          }));
        }
      });
    } catch(e) { /* ignore */ }
  }

  function saveToStorage() {
    try {
      localStorage.setItem('shitaku_custom_tasks', JSON.stringify({
        asa:  MODES.asa.tasks,
        neru: MODES.neru.tasks,
      }));
      if (rewardCfg) localStorage.setItem('shitaku_reward_image', JSON.stringify(rewardCfg));
      else           localStorage.removeItem('shitaku_reward_image');
    } catch(e) { /* ignore */ }
  }

  /* ============================================================
     FEEDBACK (haptics + sound)
  ============================================================ */
  // Haptics: native bridge in the iOS app, silent everywhere else.
  function haptic(type) {
    try {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.haptic) {
        window.webkit.messageHandlers.haptic.postMessage(type);
      }
    } catch (e) { /* ignore */ }
  }

  // Sound: synthesized with Web Audio — no asset files, works on web + app.
  let audioCtx = null;
  function audio() {
    if (audioCtx === null) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = AC ? new AC() : false;
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx || null;
  }

  // One short tone with a soft attack/decay envelope (avoids clicks).
  function tone(freq, start, dur, type, peak) {
    const ctx = audio();
    if (!ctx) return;
    const t0   = ctx.currentTime + start;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak || 0.18, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  // Cheerful two-note "ding" when a card is completed.
  function playDing() {
    tone(660, 0,    0.18, 'triangle');  // E5
    tone(990, 0.07, 0.22, 'triangle');  // B5
  }

  // Happy ascending arpeggio for the celebration.
  function playFanfare() {
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => // C5 E5 G5 C6
      tone(f, i * 0.12, 0.32, 'triangle', 0.2));
  }

  /* ============================================================
     MAIN SCREEN
  ============================================================ */
  function switchMode(mode) {
    if (mode === currentMode) return;
    va('event', { name: 'mode_switch', data: { mode } });
    currentMode = mode;
    document.body.classList.toggle('night', mode === 'neru');
    setActiveTab('tab', mode);
    clearCelebration();
    doneCount = 0;
    buildCards();
  }

  function buildCards() {
    const mode = MODES[currentMode];
    applyGridColumns();
    document.getElementById('grid').innerHTML = mode.tasks.map((task, i) => {
      const hasImg = !!getRewardCfg(i);
      return `
      <div class="card-wrap">
        <div class="card" id="card-${i}" onclick="flipCard(${i})">
          <div class="card-front">
            <div class="card-icon">${esc(task.icon)}</div>
            <div class="card-label">${esc(task.label)}</div>
          </div>
          <div class="card-back${hasImg ? ' has-img' : ''}" data-back="${i}">
            <div class="card-check">${mode.check}</div>
            <div class="card-star">${mode.star}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    applyRewardSizing();
  }

  // Apply each reward image to its card back at the card's current size.
  function applyRewardSizing() {
    document.querySelectorAll('#grid .card-back.has-img').forEach((el) => {
      const cfg = getRewardCfg(+el.dataset.back);
      if (!cfg) return;
      const r = el.getBoundingClientRect();
      applyRewardBg(el, cfg, r.width, r.height);
    });
  }

  function flipCard(i) {
    const card = document.getElementById(`card-${i}`);
    if (card.classList.contains('done')) return;
    card.classList.add('done');
    doneCount++;
    haptic('medium');
    playDing();
    va('event', { name: 'card_flip', data: { mode: currentMode, task: MODES[currentMode].tasks[i].label, count: doneCount } });
    if (doneCount === MODES[currentMode].tasks.length) {
      setTimeout(showCelebration, 700);
    }
  }

  function showCelebration() {
    haptic('success');
    playFanfare();
    va('event', { name: 'celebration', data: { mode: currentMode } });
    const mode = MODES[currentMode];
    const el   = document.getElementById('celebration');
    el.className = `${mode.celebClass} show`;
    document.getElementById('celeb-text').textContent      = mode.celebText;
    document.getElementById('celeb-emoji-top').textContent = mode.celebTop;
    document.getElementById('celeb-emoji-bot').textContent = mode.celebBot;
    launchConfetti(mode.confetti);
  }

  function launchConfetti(colors) {
    const target = document.getElementById('celebration');
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left              = (Math.random() * 100) + 'vw';
        el.style.background        = colors[Math.floor(Math.random() * colors.length)];
        el.style.width             = (7  + Math.random() * 9)  + 'px';
        el.style.height            = (10 + Math.random() * 12) + 'px';
        el.style.animationDuration = (1.8 + Math.random() * 2.5) + 's';
        el.style.animationDelay    = (Math.random() * 0.3) + 's';
        target.appendChild(el);
        setTimeout(() => el.remove(), 5000);
      }, i * 25);
    }
  }

  function resetAll() {
    clearCelebration();
    doneCount = 0;
    MODES[currentMode].tasks.forEach((_, i) => {
      document.getElementById(`card-${i}`).classList.remove('done');
    });
  }

  /* ============================================================
     SETTINGS
  ============================================================ */
  // ── hub ──
  function openSettings()  { document.getElementById('settings-page').classList.add('open'); }
  function closeSettings() { document.getElementById('settings-page').classList.remove('open'); }

  // ── cards sub-page ──
  function openTasksPage() {
    settingsBuffer = {
      asa:  MODES.asa.tasks.map(t  => ({...t})),
      neru: MODES.neru.tasks.map(t => ({...t})),
    };
    currentSettingsTab = currentMode;
    updateSettingsTabs();
    buildSettingsForm();
    document.getElementById('settings-tasks').classList.add('open');
  }
  function closeTasksPage() { document.getElementById('settings-tasks').classList.remove('open'); }

  function saveTasks() {
    collectFormToBuffer();
    MODES.asa.tasks  = settingsBuffer.asa.map(t  => ({...t}));
    MODES.neru.tasks = settingsBuffer.neru.map(t => ({...t}));
    saveToStorage();
    va('event', { name: 'settings_save' });
    doneCount = 0;
    clearCelebration();
    buildCards();
    closeTasksPage();
  }

  // ── reward image sub-page ──
  function openRewardPage() {
    settingsRewardCfg = rewardCfg ? { ...rewardCfg } : null;
    document.getElementById('settings-reward').classList.add('open');
    sizeRewardFrame();
    updateRewardEditor();
  }
  function closeRewardPage() { document.getElementById('settings-reward').classList.remove('open'); }

  function saveReward() {
    rewardCfg = settingsRewardCfg ? { ...settingsRewardCfg } : null;
    saveToStorage();
    buildCards();
    closeRewardPage();
  }

  /* ── reward image editor (drag to pan, slider to zoom) ── */
  // Match the editor frame's aspect ratio to the cards for a true preview.
  function sizeRewardFrame() {
    const frame = document.getElementById('reward-frame');
    const card  = document.querySelector('#grid .card-wrap');
    const h = 180;
    let asp = 0.86;
    if (card) { const r = card.getBoundingClientRect(); if (r.height) asp = r.width / r.height; }
    frame.style.height = h + 'px';
    frame.style.width  = Math.round(h * asp) + 'px';
  }

  function updateRewardEditor() {
    const frame = document.getElementById('reward-frame');
    const zoom  = document.getElementById('reward-zoom');
    const hint  = document.getElementById('reward-hint');
    const clr   = document.getElementById('reward-clear');
    if (settingsRewardCfg) {
      frame.classList.add('set');
      frame.textContent = '';
      applyRewardBg(frame, settingsRewardCfg, frame.clientWidth, frame.clientHeight);
      zoom.value = settingsRewardCfg.zoom;
      zoom.style.display = ''; hint.style.display = ''; clr.style.display = '';
    } else {
      frame.classList.remove('set');
      frame.textContent = '🎁';
      frame.style.backgroundImage = '';
      zoom.style.display = 'none'; hint.style.display = 'none'; clr.style.display = 'none';
    }
  }

  function handleRewardImageFile(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const max = 600;
        let { width, height } = img;
        if (width > height && width > max)        { height = Math.round(height * max / width); width = max; }
        else if (height >= width && height > max) { width = Math.round(width * max / height); height = max; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        settingsRewardCfg = {
          img: canvas.toDataURL('image/jpeg', 0.82),
          posX: 50, posY: 50, zoom: 1, nw: width, nh: height,
        };
        updateRewardEditor();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    input.value = '';  // allow re-selecting the same file
  }

  function onRewardZoom(v) {
    if (!settingsRewardCfg) return;
    settingsRewardCfg.zoom = parseFloat(v);
    const frame = document.getElementById('reward-frame');
    applyRewardBg(frame, settingsRewardCfg, frame.clientWidth, frame.clientHeight);
  }

  function clearRewardImage() {
    settingsRewardCfg = null;
    document.getElementById('reward-zoom').value = 1;
    updateRewardEditor();
  }

  // Drag the editor frame to pan the image (pointer = touch + mouse).
  (function () {
    const frame = document.getElementById('reward-frame');
    let dragging = false, lastX = 0, lastY = 0;
    frame.addEventListener('pointerdown', (e) => {
      if (!settingsRewardCfg) return;
      dragging = true; lastX = e.clientX; lastY = e.clientY;
      frame.setPointerCapture(e.pointerId);
    });
    frame.addEventListener('pointermove', (e) => {
      if (!dragging || !settingsRewardCfg) return;
      const cfg = settingsRewardCfg;
      const CW = frame.clientWidth, CH = frame.clientHeight;
      const cover = Math.max(CW / cfg.nw, CH / cfg.nh);
      const bw = cfg.nw * cover * cfg.zoom, bh = cfg.nh * cover * cfg.zoom;
      const ovx = Math.max(1, bw - CW), ovy = Math.max(1, bh - CH);
      cfg.posX = clamp(cfg.posX - (e.clientX - lastX) / ovx * 100, 0, 100);
      cfg.posY = clamp(cfg.posY - (e.clientY - lastY) / ovy * 100, 0, 100);
      lastX = e.clientX; lastY = e.clientY;
      applyRewardBg(frame, cfg, CW, CH);
    });
    const end = (e) => { dragging = false; try { frame.releasePointerCapture(e.pointerId); } catch (x) {} };
    frame.addEventListener('pointerup', end);
    frame.addEventListener('pointercancel', end);
  })();

  function switchSettingsTab(mode) {
    if (mode === currentSettingsTab) return;
    collectFormToBuffer();      // 現在のフォームをバッファに保存
    currentSettingsTab = mode;
    updateSettingsTabs();
    buildSettingsForm();
  }

  function updateSettingsTabs() {
    setActiveTab('stab', currentSettingsTab);
  }

  function buildSettingsForm() {
    const tasks = settingsBuffer[currentSettingsTab];
    document.getElementById('settings-list').innerHTML = tasks.map((task, i) => `
      <div class="settings-row">
        <span class="row-num">${i + 1}</span>
        <input type="text" class="emoji-input" value="${esc(task.icon)}" placeholder="🙂" aria-label="アイコン ${i + 1}">
        <input type="text" class="label-input" value="${esc(task.label)}" maxlength="10" placeholder="なまえ" aria-label="なまえ ${i + 1}">
      </div>
    `).join('');
  }

  function collectFormToBuffer() {
    const rows     = document.querySelectorAll('#settings-list .settings-row');
    const defaults = DEFAULT_MODES[currentSettingsTab].tasks;
    settingsBuffer[currentSettingsTab] = Array.from(rows).map((row, i) => ({
      icon:  row.querySelector('.emoji-input').value.trim()  || defaults[i].icon,
      label: row.querySelector('.label-input').value.trim()  || defaults[i].label,
    }));
  }

  function resetDefaults() {
    if (!confirm('カードをデフォルトにもどしますか？')) return;
    MODES.asa.tasks  = DEFAULT_MODES.asa.tasks.map(t  => ({...t}));
    MODES.neru.tasks = DEFAULT_MODES.neru.tasks.map(t => ({...t}));
    saveToStorage();
    va('event', { name: 'settings_reset' });
    doneCount = 0;
    clearCelebration();
    buildCards();
  }

  /* ============================================================
     INIT
  ============================================================ */
  window.addEventListener('resize', () => { applyGridColumns(); applyRewardSizing(); });
  loadFromStorage();
  buildCards();
</script>
</body>
</html>
