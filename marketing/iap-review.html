<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAP review screenshot</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic',sans-serif;
    background:linear-gradient(160deg,#ffe0ec 0%,#fff5cc 50%,#d4f0ff 100%);}
  /* dark scrim like the real paywall overlay */
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,0.45);
    display:flex;align-items:center;justify-content:center;padding:24px;}

  .paywall-card{position:relative;width:min(360px,100%);background:#fff;border-radius:24px;
    padding:24px 22px 20px;box-shadow:0 12px 40px rgba(0,0,0,0.3);text-align:center;}
  .paywall-x{position:absolute;top:12px;right:12px;width:34px;height:34px;border:none;border-radius:50%;
    background:#f0f0f2;color:#999;font-size:1rem;display:flex;align-items:center;justify-content:center;}
  .paywall-title{display:flex;align-items:center;justify-content:center;gap:5px;
    font-size:1.3rem;color:#ff5a87;margin:6px 0 16px;font-weight:bold;transform:translateX(-14px);}
  .paywall-spark{font-size:2.6rem;line-height:1;flex-shrink:0;}
  .paywall-titletxt{text-align:left;line-height:1.3;}
  .paywall-feats{list-style:none;text-align:left;margin:0 auto 18px;display:inline-block;}
  .paywall-feats li{display:flex;align-items:center;gap:10px;color:#444;font-size:0.9rem;margin:10px 0;font-weight:bold;white-space:nowrap;}
  .paywall-feats .chk{width:23px;height:23px;flex-shrink:0;display:block;}
  .paywall-feats li.soon{color:#ff5a87;margin-top:14px;}
  .paywall-buy{width:100%;font-size:1.15rem;font-weight:bold;padding:15px;border:none;border-radius:50px;
    background:linear-gradient(135deg,#ff5a87,#ff8c69);color:#fff;box-shadow:0 4px 15px rgba(255,90,135,0.45);}
  .paywall-restore{margin-top:12px;font-size:0.92rem;font-weight:bold;color:#888;background:none;border:none;}
  .paywall-note{color:#aaa;font-size:0.76rem;margin-top:12px;line-height:1.5;}
</style></head><body>
  <div class="scrim">
    <div class="paywall-card">
      <div class="paywall-x">✕</div>
      <h3 class="paywall-title"><span class="paywall-spark">✨</span><span class="paywall-titletxt">プレミアムで<br>もっと自由に</span></h3>
      <ul class="paywall-feats">
        <li><svg class="chk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#ff5a87"/><path d="M6.4 12.4 L10.3 16.3 L17.6 8.1" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>カードのアイコン・名前を変更</li>
        <li><svg class="chk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#ff5a87"/><path d="M6.4 12.4 L10.3 16.3 L17.6 8.1" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>クリア画像を設定</li>
        <li><svg class="chk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#ff5a87"/><path d="M6.4 12.4 L10.3 16.3 L17.6 8.1" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>カードの裏を何度でも変更</li>
        <li><svg class="chk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#ff5a87"/><path d="M6.4 12.4 L10.3 16.3 L17.6 8.1" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>よるモードを全部使える</li>
        <li class="soon"><svg class="chk" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#ff5a87"/><path d="M12 6.4 V17.6 M6.4 12 H17.6" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/></svg>今後も新機能を追加予定！</li>
      </ul>
      <div class="paywall-buy">購入する（¥500）</div>
      <div class="paywall-restore">購入を復元</div>
      <div class="paywall-note">1回のお支払いでずっと使えます</div>
    </div>
  </div>
</body></html>
